<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TM with AI - Intelligent Productivity Hub</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="dark-theme">
  <!-- Notifications Panel -->
  <div id="toast-container" class="toast-container"></div>

  <!-- AUTHENTICATION SCREEN -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo-container">
          <svg class="logo-svg" viewBox="0 0 100 100" width="50" height="50">
            <defs>
              <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a855f7" />
                <stop offset="100%" stop-color="#ec4899" />
              </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="40" fill="none" stroke="url(#logo-grad)" stroke-width="8" stroke-dasharray="180 60" />
            <path d="M35,50 C45,35 55,65 65,50" fill="none" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="round" />
            <defs><linearGradient id="logo-grad-fallback" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#ec4899"/></linearGradient></defs>
          </svg>
          <span class="logo-text">TM <span class="accent-text">with AI</span></span>
        </div>
        <p class="auth-subtitle">Your Intelligent Time & Productivity Planner</p>
      </div>

      <!-- Custom Holographic Security Scanner -->
      <div id="security-scanner-container" class="security-scanner-box hidden" style="margin-top: 1rem; text-align: center; padding: 1.5rem 0;">
        <div class="scanner-orbit-wrapper" style="display: flex; justify-content: center; align-items: center; margin-bottom: 1.5rem; height: 100px;">
          <div class="scanner-orbit" style="position: relative; width: 80px; height: 80px; border-radius: 50%; border: 2px dashed rgba(168, 85, 247, 0.4); animation: rotateBrain 8s linear infinite;">
            <div class="scanner-line" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; border-top: 3px solid var(--clr-primary); animation: rotateBrain 1.5s linear infinite; filter: drop-shadow(0 0 8px var(--glow-primary));"></div>
            <div style="position: absolute; inset: 12px; border-radius: 50%; background: radial-gradient(circle, rgba(168,85,247,0.2) 0%, transparent 70%); border: 1px solid rgba(236,72,153,0.2);"></div>
          </div>
        </div>
        <h3 style="margin-bottom: 0.5rem; font-family: var(--font-title); font-size: 1.25rem; font-weight: 800;" data-i18n="cf_verify_title">Security Check</h3>
        <p id="scanner-status-text" style="color: var(--text-muted); font-size: 0.88rem; max-width: 290px; margin: 0 auto; line-height: 1.6;" data-i18n="cf_verify_desc">
          Verifying browser compatibility...
        </p>
      </div>

      <!-- Clerk Authentication Container -->
      <div id="clerk-auth-container" class="hidden"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="app.js?v=3"></script>
</body>
</html>
